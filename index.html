<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Calles Valencia — Parques Bomberos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --norte: #e8420a;
    --central: #0a7be8;
    --oeste: #10b36e;
    --campanar: #f0a500;
    --bg: #0e0e12;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --correct: #10b36e;
    --wrong: #e8420a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* USER SELECT */
  #user-select-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }
  .user-select-inner { text-align: center; }
  .user-select-title {
    font-size: 36px; font-weight: 900; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .user-select-title span { color: var(--norte); }
  .user-select-sub {
    font-size: 20px; color: var(--muted); margin-bottom: 48px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .user-buttons { display: flex; gap: 20px; justify-content: center; }
  .user-btn {
    padding: 24px 56px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.1em;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text); border-radius: 12px;
    cursor: pointer; transition: all 0.2s;
  }
  .user-btn:hover {
    border-color: var(--norte); color: var(--norte);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(232,66,10,0.2);
  }

  /* HEADER RIGHT */
  .header-right {
    display: flex; align-items: center; gap: 16px;
  }
  .motivational {
    font-size: 13px; font-style: italic; color: var(--muted);
    max-width: 280px; text-align: right; line-height: 1.3;
  }
  .switch-user-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .switch-user-btn:hover { border-color: var(--text); color: var(--text); }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,18,0.95);
    backdrop-filter: blur(10px);
  }
  header h1 {
    font-size: 20px; font-weight: 900; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  header h1 span { color: var(--norte); }

  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat-pill {
    font-family: 'Space Mono', monospace;
    font-size: 12px; padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .stat-pill.ok { border-color: var(--correct); color: var(--correct); }
  .stat-pill.fail { border-color: var(--wrong); color: var(--wrong); }

  /* TABS */
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    overflow-x: auto; padding: 0 24px;
    background: var(--surface);
  }
  .tab {
    padding: 12px 20px; cursor: pointer;
    font-size: 15px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
    color: var(--muted);
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab[data-zone="todas"].active { border-color: var(--text); }
  .tab[data-zone="norte"].active { border-color: var(--norte); color: var(--norte); }
  .tab[data-zone="central"].active { border-color: var(--central); color: var(--central); }
  .tab[data-zone="oeste"].active { border-color: var(--oeste); color: var(--oeste); }
  .tab[data-zone="campanar"].active { border-color: var(--campanar); color: var(--campanar); }
  .tab[data-zone="repaso"].active { border-color: #c084fc; color: #c084fc; }

  /* MAIN */
  main {
    max-width: 680px; margin: 0 auto;
    padding: 32px 24px;
  }

  /* CARD PREGUNTA */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
  }
  .quiz-card.zone-norte::before { background: var(--norte); }
  .quiz-card.zone-central::before { background: var(--central); }
  .quiz-card.zone-oeste::before { background: var(--oeste); }
  .quiz-card.zone-campanar::before { background: var(--campanar); }

  .calle-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .calle-nombre {
    font-size: 36px; font-weight: 900; line-height: 1.1;
    margin-bottom: 6px;
  }
  .calle-grupo {
    font-size: 13px; color: var(--muted); font-style: italic;
    margin-bottom: 24px;
  }

  .card-actions {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 8px;
  }
  .btn-icon {
    width: 32px; height: 32px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: var(--muted);
    font-size: 14px; transition: all 0.15s;
    text-decoration: none;
  }
  .btn-icon:hover { border-color: var(--text); color: var(--text); }

  /* HISTORIAL DE ESTA CALLE */
  .calle-hist {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--muted);
    margin-bottom: 20px;
  }
  .calle-hist span.ok { color: var(--correct); }
  .calle-hist span.fail { color: var(--wrong); }

  /* NOTA */
  .nota-section { margin-bottom: 20px; }
  .nota-toggle {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    user-select: none; transition: color 0.15s;
  }
  .nota-toggle:hover { color: var(--text); }
  .nota-toggle .arrow { transition: transform 0.2s; display:inline-block; }
  .nota-toggle.open .arrow { transform: rotate(90deg); }
  .nota-body { display: none; margin-top: 8px; }
  .nota-body.visible { display: block; }
  .nota-textarea {
    width: 100%; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; resize: vertical; min-height: 60px;
    transition: border-color 0.15s;
  }
  .nota-textarea:focus { outline: none; border-color: var(--muted); }

  /* INPUTS RESPUESTA */
  .respuesta-section { margin-bottom: 20px; }
  .respuesta-row {
    display: grid; gap: 12px;
    grid-template-columns: 1fr 1fr;
  }
  .respuesta-row.single { grid-template-columns: 1fr; }

  .input-group label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }

  .parque-select {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 600;
    transition: all 0.15s;
  }
  .parque-select:focus { outline: none; border-color: var(--muted); }
  .parque-select::placeholder { color: var(--muted); font-size: 14px; font-weight: 400; }

  /* estado correcto/incorrecto */
  .parque-select.correct { border-color: var(--correct) !important; background-color: rgba(16,179,110,0.08); }
  .parque-select.wrong { border-color: var(--wrong) !important; background-color: rgba(232,66,10,0.08); }

  /* BOTONES */
  .btn-row { display: flex; gap: 12px; }
  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-primary {
    background: var(--text); color: var(--bg);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-skip {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border); flex: 0 0 auto; padding: 14px 20px;
  }
  .btn-skip:hover { color: var(--text); border-color: var(--muted); }

  /* FEEDBACK */
  .feedback-bar {
    padding: 14px 20px; border-radius: 8px;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    display: none; margin-bottom: 16px;
    align-items: center; gap: 12px;
  }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct { background: rgba(16,179,110,0.15); border: 1px solid var(--correct); color: var(--correct); }
  .feedback-bar.wrong { background: rgba(232,66,10,0.12); border: 1px solid var(--wrong); color: var(--wrong); }
  .feedback-correct-answer { font-size: 14px; color: var(--text); font-weight: 400; margin-top: 4px; }

  /* PROGRESO */
  .progress-bar {
    height: 3px; background: var(--border);
    border-radius: 2px; margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--text);
    border-radius: 2px; transition: width 0.3s;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--muted);
    margin-bottom: 16px; text-align: right;
  }

  /* STATS PANEL */
  .stats-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 24px;
  }
  .stats-title {
    font-size: 13px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  }
  .stats-table { width: 100%; border-collapse: collapse; }
  .stats-table th {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    text-align: left; padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .stats-table td {
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 15px; vertical-align: middle;
  }
  .stats-table tr:last-child td { border-bottom: none; }
  .fail-count {
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700; color: var(--wrong);
  }
  .ok-count {
    font-family: 'Space Mono', monospace;
    font-size: 13px; color: var(--correct);
  }
  .bar-mini {
    display: inline-block; height: 6px; border-radius: 3px;
    background: var(--wrong); margin-right: 8px; vertical-align: middle;
  }

  .badge-parque {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-norte { background: rgba(232,66,10,0.15); color: var(--norte); }
  .badge-central { background: rgba(10,123,232,0.15); color: var(--central); }
  .badge-oeste { background: rgba(16,179,110,0.15); color: var(--oeste); }
  .badge-campanar { background: rgba(240,165,0,0.15); color: var(--campanar); }

  /* EMPTY STATE */
  .empty-state-card {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state-card .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-card p { font-size: 18px; line-height: 1.6; }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 18px; }

  /* MODO COMPLETADO */
  .completed-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px;
    text-align: center; display: none;
  }
  .completed-card.show { display: block; }
  .completed-icon { font-size: 56px; margin-bottom: 16px; }
  .completed-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .completed-sub { font-size: 16px; color: var(--muted); margin-bottom: 24px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    .calle-nombre { font-size: 26px; }
    .respuesta-row { grid-template-columns: 1fr; }
    main { padding: 20px 16px; }
  }
</style>
</head>

<!-- USER SELECT SCREEN -->
<div id="user-select-screen">

      <button class="user-btn" data-user="Josep">Josep</button>
      <button class="user-btn" data-user="Tudón">Tudón</button>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
<header>
  <h1>Quiz <span>Calles</span> VLC</h1>
  <div class="header-right">
    <div class="motivational" id="motivational-phrase"></div>
    <button class="switch-user-btn" id="switch-user-btn"></button>
  </div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-zone="todas">Todas</div>
  <div class="tab" data-zone="norte">Norte</div>
  <div class="tab" data-zone="central">Central</div>
  <div class="tab" data-zone="oeste">Oeste</div>
  <div class="tab" data-zone="campanar">Campanar</div>
  <div class="tab" data-zone="repaso">★ Repaso</div>
  <div class="tab" data-zone="stats">📊 Stats</div>
</div>

<main id="main-content">

  <!-- PROGRESO -->
  <div id="quiz-area">
    <div class="progress-label" id="progress-label">1 / 10</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <!-- FEEDBACK -->
    <div class="feedback-bar" id="feedback-bar">
      <span id="feedback-icon"></span>
      <div>
        <div id="feedback-text"></div>
        <div class="feedback-correct-answer" id="feedback-answer"></div>
      </div>
    </div>

    <!-- CARD PREGUNTA -->
    <div class="quiz-card" id="quiz-card">
      <div class="card-actions">
        <a id="btn-maps" class="btn-icon" href="#" target="_blank" title="Abrir en Google Maps">📍</a>
      </div>
      <div class="calle-label">¿Qué parques corresponden?</div>
      <div class="calle-nombre" id="calle-nombre">—</div>
      <div class="calle-grupo" id="calle-grupo">—</div>
      <div class="calle-hist" id="calle-hist"></div>

      <div class="nota-section">
        <div class="nota-toggle" id="nota-toggle">
          <span class="arrow">▶</span> Mi nota
        </div>
        <div class="nota-body" id="nota-body">
          <textarea class="nota-textarea" id="nota-textarea" placeholder="Escribe aquí lo que recuerdes de esta calle..." rows="2"></textarea>
        </div>
      </div>

      <div class="respuesta-section">
        <div class="respuesta-row" id="respuesta-row">
          <div class="input-group">
            <label>1ª Salida</label>
            <input type="text" class="parque-select" id="sel-primero" placeholder="Norte / Central / Oeste / Campanar" autocomplete="off">
          </div>
          <div class="input-group" id="grupo-apoyo">
            <label>Parque de Apoyo</label>
            <input type="text" class="parque-select" id="sel-apoyo" placeholder="Norte / Central / Oeste / Campanar" autocomplete="off">
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-check">Comprobar</button>
        <button class="btn btn-skip" id="btn-next">Siguiente →</button>
      </div>
    </div>

    <div class="empty-state-card" id="empty-state-card" style="display:none;">
      <div class="icon">🏜️</div>
      <p id="empty-state-msg">No hay calles falladas aún.<br>Practica primero en otra pestaña.</p>
    </div>

    <div class="completed-card" id="completed-card">
      <div class="completed-icon">🏁</div>
      <div class="completed-title">¡Ronda completada!</div>
      <div class="completed-sub" id="completed-sub"></div>
      <button class="btn btn-primary" id="btn-restart" style="max-width:200px;margin:0 auto;">Volver a empezar</button>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div id="stats-area" style="display:none;">
    <div class="stats-panel">
      <div class="stats-title">Calles con más fallos</div>
      <table class="stats-table" id="stats-table">
        <thead>
          <tr>
            <th>Calle</th>
            <th>Zona</th>
            <th style="text-align:right">✗ Fallos</th>
            <th style="text-align:right">✓ Aciertos</th>
          </tr>
        </thead>
        <tbody id="stats-tbody"></tbody>
      </table>
    </div>
  </div>

</main>

// Parse CSV → array of entries
// Each entry: { zone, grupo, calle, salidas: [[p1,p2], ...] }
function parseData(raw) {
  const lines = raw.trim().split('\n');
  const map = new Map(); // key = calle|zone

  for (const line of lines) {
    const parts = line.split(',');
    if (parts.length < 5) continue;
    const zone = parts[0].trim();
    const grupo = parts[1].trim();
    const calle = parts[2].trim();
    const p1 = parts[3].trim();
    const p2 = parts[4].trim();
    // ignore lines with "Saler" or unknown
    if (!p1 || !p2 || p1 === 'Sur' || p2 === 'Saler' || p2 === 'Sur') continue;

    const key = calle + '|||' + zone;
    if (!map.has(key)) {
      map.set(key, { zone, grupo, calle, salidas: [] });
    }
    // check duplicate combo
    const entry = map.get(key);
    const exists = entry.salidas.some(s => s[0] === p1 && s[1] === p2);
    if (!exists) entry.salidas.push([p1, p2]);
    // Also add reverse as valid
    const existsRev = entry.salidas.some(s => s[0] === p2 && s[1] === p1);
    if (!existsRev) entry.salidas.push([p2, p1]);
  }
  return Array.from(map.values());
}

const ALL_ENTRIES = parseData(RAW);

// ============================================================
// STORAGE
// ============================================================
let CURRENT_USER = '';
const LS_KEY_PREFIX = 'quiz_calles_vlc_v2_';

function getLSKey() { return LS_KEY_PREFIX + CURRENT_USER; }

function loadStorage() {
  try {
    return JSON.parse(localStorage.getItem(getLSKey())) || {};
  } catch { return {}; }
}
function saveStorage(data) {
  try { localStorage.setItem(getLSKey(), JSON.stringify(data)); } catch {}
}

let store = {};
// store = { [calle]: { ok: N, fail: N, nota: '' }, ... }

function getRecord(calle) {
  if (!store[calle]) store[calle] = { ok: 0, fail: 0, streak: 0, nota: '' };
  if (store[calle].streak === undefined) store[calle].streak = 0;
  return store[calle];
}
function saveRecord(calle, rec) {
  store[calle] = rec;
  saveStorage(store);
}

// ============================================================
// STATE
// ============================================================
let currentZone = 'todas';
let queue = [];
let qIndex = 0;
let answered = false;
let sessionOk = 0;
let sessionFail = 0;

function getFilteredEntries(zone) {
  if (zone === 'todas') return [...ALL_ENTRIES];
  if (zone === 'repaso') {
    return ALL_ENTRIES.filter(e => {
      const r = store[e.calle];
      return r && r.fail > 0 && (r.streak || 0) < 3;
    });
  }
  const z = zone.charAt(0).toUpperCase() + zone.slice(1);
  return ALL_ENTRIES.filter(e => e.zone === z);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(zone) {
  currentZone = zone;
  const entries = getFilteredEntries(zone);
  if (!entries.length) {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('completed-card').classList.remove('show');
    const msg = zone === 'repaso'
      ? 'No hay calles falladas aún.<br>Practica primero en otra pestaña.'
      : 'No hay calles en esta zona.';
    document.getElementById('empty-state-msg').innerHTML = msg;
    document.getElementById('empty-state-card').style.display = 'block';
    document.getElementById('feedback-bar').classList.remove('show');
    return;
  }
  document.getElementById('empty-state-card').style.display = 'none';
  queue = shuffle(entries);
  qIndex = 0;
  answered = false;
  sessionOk = 0;
  sessionFail = 0;
  document.getElementById('feedback-bar').classList.remove('show');
  document.getElementById('completed-card').classList.remove('show');
  document.getElementById('quiz-card').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (qIndex >= queue.length) {
    showCompleted();
    return;
  }
  const e = queue[qIndex];
  answered = false;

  // Restore card HTML structure
  document.getElementById('empty-state-card').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('completed-card').classList.remove('show');
  const card = document.getElementById('quiz-card');
  // reset color classes
  card.className = 'quiz-card zone-' + e.zone.toLowerCase();

  document.getElementById('calle-nombre').textContent = e.calle;
  document.getElementById('calle-grupo').textContent = e.grupo;

  // Maps link
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(e.calle + ', Valencia, Spain')}`;
  document.getElementById('btn-maps').href = mapsUrl;

  // Historial
  const rec = getRecord(e.calle);
  const hist = document.getElementById('calle-hist');
  if (rec.ok > 0 || rec.fail > 0) {
    hist.innerHTML = `Historial: <span class="ok">✓ ${rec.ok}</span>  <span class="fail">✗ ${rec.fail}</span>`;
  } else {
    hist.innerHTML = 'Primera vez';
  }

  // Nota
  const textarea = document.getElementById('nota-textarea');
  textarea.value = rec.nota || '';
  document.getElementById('nota-body').classList.remove('visible');
  document.getElementById('nota-toggle').classList.remove('open');
  
  

  // Selects
  const selP = document.getElementById('sel-primero');
  const selA = document.getElementById('sel-apoyo');
  const grupoApoyo = document.getElementById('grupo-apoyo');
  const row = document.getElementById('respuesta-row');

  selP.value = '';
  selA.value = '';
  selP.className = 'parque-select';
  selA.className = 'parque-select';

  if (currentZone !== 'todas' && currentZone !== 'repaso') {
    // solo apoyo
    row.className = 'respuesta-row single';
    selP.parentElement.style.display = 'none';
    grupoApoyo.style.display = 'block';
    selA.parentElement.querySelector('label').textContent = 'Parque de Apoyo';
  } else {
    row.className = 'respuesta-row';
    selP.parentElement.style.display = 'block';
    grupoApoyo.style.display = 'block';
    selA.parentElement.querySelector('label').textContent = 'Parque de Apoyo';
  }

  // Progress
  document.getElementById('progress-label').textContent = `${qIndex + 1} / ${queue.length}`;
  document.getElementById('progress-fill').style.width = `${(qIndex / queue.length) * 100}%`;

  document.getElementById('btn-check').textContent = 'Comprobar';
  document.getElementById('btn-check').disabled = false;
  document.getElementById('feedback-bar').classList.remove('show');

  updateHeaderStats();
}

function checkAnswer() {
  if (answered) { nextQuestion(); return; }

  const e = queue[qIndex];
  const rec = getRecord(e.calle);
  const selP = document.getElementById('sel-primero');
  const selA = document.getElementById('sel-apoyo');
  const isZoneMode = currentZone !== 'todas' && currentZone !== 'repaso';

  let correct = false;

  const normalize = v => v.trim().toLowerCase();

  if (isZoneMode) {
    const apoyo = selA.value;
    if (!apoyo.trim()) { selA.style.borderColor = 'var(--wrong)'; return; }
    const validApoyos = new Set(e.salidas.map(s => s[1].toLowerCase()));
    correct = validApoyos.has(normalize(apoyo));
    selA.className = 'parque-select ' + (correct ? 'correct' : 'wrong');
  } else {
    const p1 = selP.value;
    const p2 = selA.value;
    if (!p1.trim()) { selP.style.borderColor = 'var(--wrong)'; return; }
    if (!p2.trim()) { selA.style.borderColor = 'var(--wrong)'; return; }
    correct = e.salidas.some(s =>
      s[0].toLowerCase() === normalize(p1) &&
      s[1].toLowerCase() === normalize(p2)
    );
    selP.className = 'parque-select ' + (correct ? 'correct' : 'wrong');
    selA.className = 'parque-select ' + (correct ? 'correct' : 'wrong');
  }

  // Save nota on answer
  rec.nota = document.getElementById('nota-textarea').value;

  if (correct) {
    rec.ok++;
    rec.streak = (rec.streak || 0) + 1;
    sessionOk++;
    showFeedback(true, e);
  } else {
    rec.fail++;
    rec.streak = 0;
    sessionFail++;
    showFeedback(false, e);
  }

  saveRecord(e.calle, rec);
  answered = true;
  document.getElementById('btn-check').textContent = 'Siguiente →';
  updateHeaderStats();
}

function showFeedback(ok, e) {
  const bar = document.getElementById('feedback-bar');
  bar.className = 'feedback-bar show ' + (ok ? 'correct' : 'wrong');
  document.getElementById('feedback-icon').textContent = ok ? '✓' : '✗';
  document.getElementById('feedback-text').textContent = ok ? '¡Correcto!' : 'Incorrecto';
  if (!ok) {
    const combos = e.salidas
      .filter((s, i, arr) => arr.findIndex(x => x[0]===s[0] && x[1]===s[1]) === i)
      .filter(s => s[0] === e.zone || currentZone === 'todas' || currentZone === 'repaso')
      .slice(0, 4)
      .map(s => `${s[0]} → ${s[1]}`).join(' / ');
    document.getElementById('feedback-answer').textContent = 'Respuesta: ' + combos;
  } else {
    document.getElementById('feedback-answer').textContent = '';
  }
}

function nextQuestion() {
  // save nota before moving
  if (qIndex < queue.length) {
    const e = queue[qIndex];
    const rec = getRecord(e.calle);
    rec.nota = document.getElementById('nota-textarea').value;
    saveRecord(e.calle, rec);
  }
  qIndex++;
  document.getElementById('feedback-bar').classList.remove('show');
  renderQuestion();
}

function showCompleted() {
  document.getElementById('quiz-card').style.display = 'none';
  const c = document.getElementById('completed-card');
  c.classList.add('show');
  document.getElementById('completed-sub').textContent =
    `${sessionOk} acertadas · ${sessionFail} falladas de ${queue.length} calles`;
}

function updateHeaderStats() {
  // stats pills removed
}

// ============================================================
// STATS VIEW
// ============================================================
function renderStats() {
  const tbody = document.getElementById('stats-tbody');
  const entries = ALL_ENTRIES.map(e => ({
    ...e,
    rec: getRecord(e.calle)
  })).filter(e => e.rec.fail > 0 || e.rec.ok > 0);

  entries.sort((a, b) => b.rec.fail - a.rec.fail);

  if (!entries.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">Aún no hay datos. ¡Empieza a practicar!</td></tr>';
    return;
  }

  const maxFail = entries[0]?.rec.fail || 1;
  tbody.innerHTML = entries.slice(0, 100).map(e => {
    const barW = Math.round((e.rec.fail / maxFail) * 80);
    const badgeClass = 'badge-' + e.zone.toLowerCase();
    const streak = e.rec.streak || 0;
    const streakLabel = streak > 0 ? `<span style="color:var(--correct);font-size:11px">🔥${streak}</span>` : '';
    return `<tr>
      <td>
        <span class="bar-mini" style="width:${barW}px"></span>
        ${e.calle} ${streakLabel}
      </td>
      <td><span class="badge-parque ${badgeClass}">${e.zone}</span></td>
      <td style="text-align:right"><span class="fail-count">${e.rec.fail}</span></td>
      <td style="text-align:right"><span class="ok-count">${e.rec.ok}</span></td>
    </tr>`;
  }).join('');
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const zone = tab.dataset.zone;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');

  const quizArea = document.getElementById('quiz-area');
  const statsArea = document.getElementById('stats-area');

  if (zone === 'stats') {
    quizArea.style.display = 'none';
    statsArea.style.display = 'block';
    renderStats();
  } else {
    quizArea.style.display = 'block';
    statsArea.style.display = 'none';
    startQuiz(zone);
  }
});

document.getElementById('btn-check').addEventListener('click', () => {
  if (answered) nextQuestion();
  else checkAnswer();
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (!answered) {
    // skip: count as no answer, just advance
    const e = queue[qIndex];
    const rec = getRecord(e.calle);
    rec.nota = document.getElementById('nota-textarea').value;
    saveRecord(e.calle, rec);
  }
  qIndex++;
  answered = false;
  document.getElementById('feedback-bar').classList.remove('show');
  renderQuestion();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  startQuiz(currentZone);
});

document.getElementById('nota-toggle').addEventListener('click', () => {
  const body = document.getElementById('nota-body');
  const toggle = document.getElementById('nota-toggle');
  body.classList.toggle('visible');
  toggle.classList.toggle('open');
});

// Save nota on textarea blur
document.getElementById('nota-textarea').addEventListener('blur', () => {
  if (qIndex < queue.length) {
    const e = queue[qIndex];
    const rec = getRecord(e.calle);
    rec.nota = document.getElementById('nota-textarea').value;
    saveRecord(e.calle, rec);
  }
});

// Enter key submits
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement !== document.getElementById('nota-textarea')) {
    const btn = document.getElementById('btn-check');
    if (!btn.disabled) btn.click();
  }
});

function enterApp(user) {
  CURRENT_USER = user;
  store = loadStorage();
  document.getElementById('user-select-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('switch-user-btn').textContent = '↩ ' + user;
  document.getElementById('motivational-phrase').textContent = getDailyPhrase();
  startQuiz('todas');
}

document.querySelectorAll('.user-btn').forEach(btn => {
  btn.addEventListener('click', () => enterApp(btn.dataset.user));
});

  document.getElementById('app').style.display = 'none';
  document.getElementById('user-select-screen').style.display = 'flex';
